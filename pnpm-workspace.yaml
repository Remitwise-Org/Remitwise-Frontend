allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@reown/appkit': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@tree-sitter-grammars/tree-sitter-yaml': true
  bufferutil: true
  core-js-pure: true
  esbuild: true
  prisma: true
  sharp: true
  tree-sitter: true
  tree-sitter-json: true
  unrs-resolver: true
  utf-8-validate: true
minimumReleaseAgeExclude:
  - '@sentry/browser-utils@10.60.0'
  - '@sentry/browser@10.60.0'
  - '@sentry/core@10.60.0'
  - '@sentry/feedback@10.60.0'
  - '@sentry/nextjs@10.60.0'
  - '@sentry/node-core@10.60.0'
  - '@sentry/node@10.60.0'
  - '@sentry/opentelemetry@10.60.0'
  - '@sentry/react@10.60.0'
  - '@sentry/replay-canvas@10.60.0'
  - '@sentry/replay@10.60.0'
  - '@sentry/server-utils@10.60.0'
  - '@sentry/vercel-edge@10.60.0'
